<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>El Ramon Perroquet Game</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(#ffcf6b, #ff7b54);
      color: #111;
      text-align: center;
    }

    .container {
      padding: 60px 20px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    p {
      font-size: 20px;
      max-width: 700px;
      margin: 0 auto 30px;
    }

    .button {
      display: inline-block;
      background: #111;
      color: white;
      padding: 16px 28px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 20px;
      font-weight: bold;
    }

    .box {
      margin: 40px auto;
      max-width: 700px;
      background: rgba(255,255,255,0.75);
      padding: 25px;
      border-radius: 18px;

<body>
  <div class="container">
    <h1>🦜 El Ramon Perroquet Game</h1>
    <p>
      Un mini-jeu tropical rétro façon plateforme, avec potions, fruits,
      ennemis, passages secrets et boss final.
    </p>

    <a class="button" href="#">Jouer bientôt</a>

    <div class="box">
      <h2>Version test en ligne</h2>
      <p>
        La landing page fonctionne. Prochaine étape : connecter le jeu,
        les niveaux et les gros fichiers avec Cloudflare R2.
